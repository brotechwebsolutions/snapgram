services:
  - type: web
    name: snapgram-backend
    env: java
    region: oregon
    plan: free
    # Root directory is the REPO ROOT — build command navigates into /backend
    rootDir: .
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/snapgram-backend.jar
    healthCheckPath: /actuator/health
    envVars:
      # Java version — REQUIRED for Java 17
      - key: JAVA_VERSION
        value: "17"
      # All secrets — set these in Render dashboard, never commit values
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BASE_URL
        sync: false
